<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peak Bagging Poster Generator</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="shell">
      <!-- Top bar ----------------------------------------------------- -->
      <header class="topbar">
        <div class="topbar__brand">
          <span class="topbar__mark" aria-hidden="true">▲</span>
          <span class="topbar__name">Peak Bagging Poster</span>
        </div>
        <div class="topbar__meta" id="status">
          <span class="topbar__chip" id="chip-peaks">0 peaks</span>
          <span class="topbar__chip" id="chip-zoom">z—</span>
          <span class="topbar__chip topbar__chip--state" id="chip-status">
            ready
          </span>
        </div>
        <div class="topbar__actions">
          <div class="seg" role="group" aria-label="Units">
            <button data-unit="ft" class="seg__btn seg__btn--on" id="unit-ft">
              ft
            </button>
            <button data-unit="m" class="seg__btn" id="unit-m">m</button>
          </div>
          <button class="btn btn--ghost" id="toggle-panel" aria-expanded="true">
            <span class="btn__icon" aria-hidden="true">⏷</span>
            <span>Controls</span>
          </button>
          <button class="btn btn--solid" id="print">Print / PDF</button>
        </div>
      </header>

      <!-- Main work area ---------------------------------------------- -->
      <div class="work">
        <!-- Control panel ------------------------------------------- -->
        <aside class="panel" id="panel" aria-label="Poster controls">
          <details class="panel__section" open>
            <summary class="panel__summary">
              <span>01</span> Region
            </summary>
            <div class="panel__body">
              <label class="field">
                <span class="field__label">Jump to a place</span>
                <div class="combo">
                  <input
                    type="search"
                    id="search-input"
                    placeholder="e.g. Lake Placid, NY"
                    autocomplete="off"
                  />
                  <button class="combo__btn" id="search-btn">Go</button>
                </div>
                <ul class="combo__results" id="search-results"></ul>
              </label>
              <div class="presets">
                <button
                  class="preset"
                  data-bounds="43.85,-74.50,44.55,-73.55"
                  data-zoom="10"
                  data-label="Adirondack High Peaks"
                >
                  Adirondack HP
                </button>
                <button
                  class="preset"
                  data-bounds="41.85,-74.65,42.30,-74.10"
                  data-zoom="11"
                  data-label="Catskill 3500"
                >
                  Catskills
                </button>
                <button
                  class="preset"
                  data-bounds="43.95,-71.85,44.50,-71.10"
                  data-zoom="10"
                  data-label="White Mountains"
                >
                  White Mtns
                </button>
                <button
                  class="preset"
                  data-bounds="44.00,-72.95,44.60,-72.55"
                  data-zoom="11"
                  data-label="Green Mountains"
                >
                  Green Mtns
                </button>
                <button
                  class="preset"
                  data-bounds="35.40,-83.95,35.80,-83.20"
                  data-zoom="10"
                  data-label="Smokies"
                >
                  Smokies
                </button>
                <button
                  class="preset"
                  data-bounds="39.50,-106.60,40.30,-105.50"
                  data-zoom="9"
                  data-label="Front Range 14ers"
                >
                  Front Range
                </button>
              </div>
            </div>
          </details>

          <details class="panel__section" open>
            <summary class="panel__summary">
              <span>02</span> Peaks
            </summary>
            <div class="panel__body">
              <div class="field">
                <div class="field__row">
                  <span class="field__label">Elevation filter</span>
                  <span class="field__value" id="elev-readout">— / —</span>
                </div>
                <div class="dual-slider" id="elev-slider">
                  <input
                    type="range"
                    id="elev-min"
                    min="0"
                    max="9000"
                    value="0"
                    step="10"
                  />
                  <input
                    type="range"
                    id="elev-max"
                    min="0"
                    max="9000"
                    value="9000"
                    step="10"
                  />
                </div>
                <p class="field__hint">
                  Peaks outside this range are dimmed but stay visible so the
                  composition isn't broken.
                </p>
              </div>

              <label class="check">
                <input type="checkbox" id="opt-require-name" />
                <span>Only peaks with a name</span>
              </label>
              <label class="check">
                <input type="checkbox" id="opt-require-ele" checked />
                <span>Only peaks with elevation data</span>
              </label>
              <label class="check">
                <input type="checkbox" id="opt-show-elev" checked />
                <span>Show elevation on labels</span>
              </label>
              <label class="check">
                <input type="checkbox" id="opt-show-labels" checked />
                <span>Show peak names</span>
              </label>

              <label class="field">
                <span class="field__label">
                  Limit to top N peaks
                  <span class="field__value" id="topn-readout">all</span>
                </span>
                <input
                  type="range"
                  id="opt-topn"
                  min="0"
                  max="200"
                  value="0"
                  step="1"
                />
                <p class="field__hint">
                  0 = no limit. Otherwise only the N highest visible peaks are
                  labeled.
                </p>
              </label>
            </div>
          </details>

          <details class="panel__section">
            <summary class="panel__summary">
              <span>03</span> Style
            </summary>
            <div class="panel__body">
              <label class="check">
                <input type="checkbox" id="opt-topo" checked />
                <span>Hillshade base</span>
              </label>
              <label class="check">
                <input type="checkbox" id="opt-contours" checked />
                <span>Contour overlay</span>
              </label>
              <label class="field">
                <span class="field__label">
                  Contour density
                  <span class="field__value" id="contour-readout">60%</span>
                </span>
                <input
                  type="range"
                  id="opt-contour-density"
                  min="0"
                  max="100"
                  value="60"
                />
                <p class="field__hint">
                  Topographic lines only — no place names. Slide down for a
                  cleaner poster, up for denser detail.
                </p>
              </label>
              <label class="check">
                <input type="checkbox" id="opt-osm" />
                <span>Add road / water overlay</span>
              </label>
              <label class="field">
                <span class="field__label">
                  Saturation
                  <span class="field__value" id="sat-readout">0%</span>
                </span>
                <input type="range" id="opt-sat" min="0" max="100" value="0" />
              </label>
              <label class="field">
                <span class="field__label">
                  Contrast
                  <span class="field__value" id="con-readout">115%</span>
                </span>
                <input
                  type="range"
                  id="opt-con"
                  min="50"
                  max="220"
                  value="115"
                />
              </label>
              <label class="field">
                <span class="field__label">
                  Brightness
                  <span class="field__value" id="bri-readout">105%</span>
                </span>
                <input
                  type="range"
                  id="opt-bri"
                  min="50"
                  max="160"
                  value="105"
                />
              </label>
            </div>
          </details>

          <details class="panel__section">
            <summary class="panel__summary">
              <span>04</span> Poster
            </summary>
            <div class="panel__body">
              <label class="field">
                <span class="field__label">Title</span>
                <input type="text" id="poster-title" value="High Peaks" />
              </label>
              <label class="field">
                <span class="field__label">Subtitle</span>
                <input
                  type="text"
                  id="poster-subtitle"
                  value="A Topographic Survey"
                />
              </label>
              <label class="field">
                <span class="field__label">Aspect</span>
                <select id="aspect">
                  <option value="2:3">2:3 portrait (12×18)</option>
                  <option value="3:4" selected>3:4 portrait (18×24)</option>
                  <option value="4:5">4:5 portrait (16×20)</option>
                  <option value="1:1">1:1 square</option>
                  <option value="4:3">4:3 landscape</option>
                  <option value="3:2">3:2 landscape</option>
                </select>
              </label>
              <label class="check">
                <input type="checkbox" id="opt-border" checked />
                <span>Inner border frame</span>
              </label>
              <label class="check">
                <input type="checkbox" id="opt-attribution" checked />
                <span>Show map attribution</span>
              </label>
            </div>
          </details>

          <details class="panel__section">
            <summary class="panel__summary">
              <span>05</span> Visible Peaks
              <span class="badge" id="badge-peaks">0</span>
            </summary>
            <div class="panel__body panel__body--list">
              <ul class="peaklist" id="peaklist"></ul>
            </div>
          </details>
        </aside>

        <!-- Poster stage -------------------------------------------- -->
        <main class="stage">
          <div class="poster" id="poster" data-aspect="3:4">
            <div class="poster__frame">
              <header class="poster__head">
                <h1 class="poster__title" id="title-display">High Peaks</h1>
                <p class="poster__sub" id="subtitle-display">
                  A Topographic Survey
                </p>
              </header>
              <div class="poster__map" id="map" aria-label="Map preview"></div>
              <footer class="poster__foot">
                <span class="poster__coord" id="foot-coord">—</span>
                <span class="poster__sep" aria-hidden="true">·</span>
                <span class="poster__scale" id="foot-scale">—</span>
                <span class="poster__sep" aria-hidden="true">·</span>
                <span class="poster__unit" id="foot-unit">elevations in feet</span>
              </footer>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
